<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Country Info Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      background: #1a73e8;
      color: #fff;
      padding: 16px 24px;
      text-align: center;
    }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header p  { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }

    #chat-wrapper {
      width: 100%;
      max-width: 760px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 16px 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 16px;
    }

    .msg {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 0.95rem;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.agent {
      align-self: flex-start;
      background: #fff;
      color: #202124;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
    }
    .msg.agent.error-msg { border-left: 4px solid #d93025; }

    .meta {
      font-size: 0.72rem;
      color: #888;
      margin-top: 5px;
    }

    .typing {
      align-self: flex-start;
      background: #fff;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 12px 18px;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .typing span {
      width: 8px; height: 8px;
      background: #aaa;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(1); }
      40%            { opacity: 1;   transform: scale(1.2); }
    }

    #input-area {
      position: sticky;
      bottom: 0;
      background: #f0f2f5;
      padding: 12px 0 20px;
      display: flex;
      gap: 10px;
    }
    #question {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #dadce0;
      border-radius: 24px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
      background: #fff;
    }
    #question:focus { border-color: #1a73e8; }
    #send-btn {
      padding: 0 22px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s;
    }
    #send-btn:hover:not(:disabled) { background: #1558b0; }
    #send-btn:disabled { background: #a8c7fa; cursor: not-allowed; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .chip {
      padding: 6px 14px;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 20px;
      font-size: 0.82rem;
      cursor: pointer;
      color: #1a73e8;
      transition: background .15s;
      white-space: nowrap;
    }
    .chip:hover { background: #e8f0fe; }
  </style>
</head>
<body>

<header>
  <h1>Country Information Agent</h1>
  <p>Ask anything about countries — population, capital, currency, languages, and more.</p>
</header>

<div id="chat-wrapper">
  <div class="suggestions" id="suggestions">
    <span class="chip" onclick="useSuggestion(this)">What is the population of Germany?</span>
    <span class="chip" onclick="useSuggestion(this)">What currency does Japan use?</span>
    <span class="chip" onclick="useSuggestion(this)">Capital and population of Brazil?</span>
    <span class="chip" onclick="useSuggestion(this)">Compare India and China by area</span>
    <span class="chip" onclick="useSuggestion(this)">What languages are spoken in Switzerland?</span>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <input
      id="question"
      type="text"
      placeholder="Ask about any country..."
      autocomplete="off"
      onkeydown="if(event.key==='Enter') send()"
    />
    <button id="send-btn" onclick="send()">Send</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("question");
  const sendBtn    = document.getElementById("send-btn");

  // Conversation history — stores last 5 Q&A pairs for follow-up context
  const conversationHistory = [];
  const MAX_HISTORY = 5;

  function useSuggestion(el) {
    inputEl.value = el.textContent;
    inputEl.focus();
    document.getElementById("suggestions").style.display = "none";
  }

  function appendMessage(text, role, meta) {
    const isError = role === "agent" && meta && meta.isError;
    const div = document.createElement("div");
    div.className = `msg ${role}${isError ? " error-msg" : ""}`;
    div.textContent = text;

    if (meta && (meta.countries || meta.fields)) {
      const metaDiv = document.createElement("div");
      metaDiv.className = "meta";
      const parts = [];
      if (meta.countries && meta.countries.length) parts.push("Countries: " + meta.countries.join(", "));
      if (meta.fields   && meta.fields.length)    parts.push("Fields: "    + meta.fields.join(", "));
      metaDiv.textContent = parts.join(" | ");
      div.appendChild(metaDiv);
    }

    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const el = document.createElement("div");
    el.className = "typing";
    el.id = "typing-indicator";
    el.innerHTML = "<span></span><span></span><span></span>";
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  async function send() {
    const question = inputEl.value.trim();
    if (!question) return;

    document.getElementById("suggestions").style.display = "none";
    appendMessage(question, "user");
    inputEl.value = "";
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question,
          history: conversationHistory.slice(-MAX_HISTORY),
        }),
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        appendMessage(err.detail || "Something went wrong. Please try again.", "agent", { isError: true });
        return;
      }

      const data = await res.json();
      appendMessage(data.answer, "agent", {
        countries: data.countries,
        fields: data.fields,
        isError: !!data.error && !data.answer.startsWith("Sorry"),
      });

      // Add to conversation history for follow-up context
      conversationHistory.push({
        question: question,
        answer: data.answer,
      });

      // Keep history bounded
      if (conversationHistory.length > MAX_HISTORY) {
        conversationHistory.shift();
      }

    } catch (e) {
      removeTyping();
      appendMessage("Network error — is the server running?", "agent", { isError: true });
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
